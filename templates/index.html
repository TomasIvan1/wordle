<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Online</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-required">
    <header class="topbar">
        <div class="topbar-left">
            <button id="nav-leaderboard" class="icon-button" title="Leaderboard" type="button">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
            </button>
        </div>
        <h1>Wordle</h1>
        <div class="topbar-right">
            <button id="new-game" class="icon-button" title="Nová hra" type="button">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <nav id="user-nav" class="user-nav hidden" aria-label="Používateľ">
                <span id="user-name"></span>
                <button id="logout" class="secondary-button" type="button">Odhlásiť sa</button>
            </nav>
        </div>
    </header>

    <main class="layout">
        <section id="game" class="panel game-panel">
            <div id="message" class="message" role="status"></div>
            <div id="board" class="board" aria-label="Wordle hracia plocha"></div>
            <div id="keyboard" class="keyboard" aria-label="Klávesnica"></div>
        </section>
        
        <section id="leaderboard-view" class="panel leaderboard-panel hidden">
            <h2>Leaderboard</h2>
            <ol id="leaderboard" class="leaderboard">
                <li>Načítavam...</li>
            </ol>
        </section>

        <aside class="sidebar">
            <section class="panel auth-panel">
                <div class="auth-header">
                    <h2>Prihlásenie</h2>
                    <p>Vitaj! Pre ukladanie skóre sa prihlás.</p>
                </div>
                <form id="auth-form">
                    <div class="input-group">
                        <input id="email" type="email" placeholder="Tvoj Email" autocomplete="email" required>
                    </div>
                    <div class="input-group password-group">
                        <input id="password" type="password" placeholder="Tvoje Heslo" autocomplete="current-password" required minlength="6">
                        <button type="button" id="toggle-password" class="password-toggle" aria-label="Zobraziť heslo" tabindex="-1">
                            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            <svg class="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                        </button>
                    </div>
                    <div class="input-group" id="display-name-group" style="display: none;">
                        <input id="display-name" type="text" placeholder="Meno do tabuľky (nepovinné)" maxlength="24">
                    </div>
                    <div class="auth-actions">
                        <button type="submit" id="primary-auth-button" class="primary-button">Prihlásiť sa</button>
                        <button id="toggle-auth-mode" class="secondary-button" type="button">Nová registrácia</button>
                    </div>
                </form>
            </section>
        </aside>
    </main>

    <dialog id="new-game-modal" class="modal">
        <div class="modal-content">
            <h2>Nová hra?</h2>
            <p>Súčasná rozohraná hra sa stratí. Naozaj chceš pokračovať?</p>
            <div class="modal-actions">
                <button id="modal-yes" class="danger-button" type="button">Áno, nová hra</button>
                <button id="modal-no" class="secondary-button" type="button">Zrušiť</button>
            </div>
        </div>
    </dialog>

    <dialog id="logout-modal" class="modal">
        <div class="modal-content">
            <h2>Odhlásenie</h2>
            <p>Naozaj sa chceš odhlásiť zo svojho účtu?</p>
            <div class="modal-actions">
                <button id="modal-logout-yes" class="danger-button" type="button">Áno, odhlásiť</button>
                <button id="modal-logout-no" class="secondary-button" type="button">Zrušiť</button>
            </div>
        </div>
    </dialog>

    <footer class="app-footer">
        <p>&copy; 2026 Všetky práva vyhradené.</p>
    </footer>

    <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
