<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Online</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-required">
    <header class="topbar">
        <div class="topbar-left">
            <button id="nav-leaderboard" class="icon-button" title="Leaderboard" type="button">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
            </button>
        </div>
        <h1>Wordle</h1>
        <div class="topbar-right">
            <button id="new-game" class="icon-button" title="Nová hra" type="button">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <nav id="user-nav" class="user-nav hidden" aria-label="Používateľ">
                <span id="user-name"></span>
                <button id="logout" class="secondary-button" type="button">Odhlásiť sa</button>
            </nav>
        </div>
    </header>

    <main class="layout">
        <section id="game" class="panel game-panel">
            <div id="message" class="message" role="status"></div>
            <div id="board" class="board" aria-label="Wordle hracia plocha"></div>
            <div id="keyboard" class="keyboard" aria-label="Klávesnica"></div>
        </section>
        
        <section id="leaderboard-view" class="panel leaderboard-panel hidden">
            <h2>Leaderboard</h2>
            <ol id="leaderboard" class="leaderboard">
                <li>Načítavam...</li>
            </ol>
        </section>

        <aside class="sidebar">
            <section class="panel auth-panel">
                <h2>Prihlásenie</h2>
                <form id="auth-form">
                    <input id="email" type="email" placeholder="Email" autocomplete="email" required>
                    <input id="password" type="password" placeholder="Heslo" autocomplete="current-password" required minlength="6">
                    <input id="display-name" type="text" placeholder="Meno v tabuľke" maxlength="24">
                    <div class="auth-actions">
                        <button type="submit">Prihlásiť</button>
                        <button id="register" class="secondary-button" type="button">Registrovať</button>
                    </div>
                </form>
            </section>
        </aside>
    </main>

    <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
